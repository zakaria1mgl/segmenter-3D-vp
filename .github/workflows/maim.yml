name: RDP-Linux-Docker
on:
  workflow_dispatch:
jobs:
  rdp-job:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Install Desktop + XRDP + SSH
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            xfce4 xfce4-goodies xrdp xorgxrdp dbus-x11 policykit-1 \
            openssh-server firefox
          sudo systemctl enable ssh
          sudo systemctl start ssh
          sudo systemctl enable xrdp
          sudo adduser xrdp ssl-cert

      - name: Create RDP/SSH User
        run: |
          PASSWORD="Haron1213"
          sudo useradd -m -s /bin/bash rdpuser
          echo "rdpuser:$PASSWORD" | sudo chpasswd
          sudo usermod -aG sudo rdpuser
          echo "RDP_USER=rdpuser" >> $GITHUB_ENV
          echo "RDP_PASS=$PASSWORD" >> $GITHUB_ENV

      - name: Configure XFCE session
        run: |
          echo "startxfce4" | sudo -u rdpuser tee /home/rdpuser/.xsession
          sudo chmod +x /home/rdpuser/.xsession
          sudo chown rdpuser:rdpuser /home/rdpuser/.xsession
          sudo bash -c 'cat > /etc/xrdp/startwm.sh' << 'EOF'
          #!/bin/sh
          if [ -r /etc/profile ]; then . /etc/profile; fi
          if [ -r ~/.profile ]; then . ~/.profile; fi
          unset DBUS_SESSION_BUS_ADDRESS
          unset XDG_RUNTIME_DIR
          exec startxfce4
          EOF
          sudo chmod +x /etc/xrdp/startwm.sh
          sudo systemctl restart xrdp

      - name: Add rdpuser to docker group
        run: |
          sudo groupadd docker || true
          sudo usermod -aG docker rdpuser

      - name: Verify Docker
        run: |
          docker --version
          sudo docker info
          sudo docker run hello-world

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner-${{ github.run_id }}
          TS_IP=$(tailscale ip -4)
          echo "TS_IP=$TS_IP" >> $GITHUB_ENV

      - name: Show Connection Info
        run: |
          echo "============================"
          echo "✅ Connected Successfully"
          echo "IP Address (Tailscale): $TS_IP"
          echo "Username: $RDP_USER"
          echo "Password: $RDP_PASS"
          echo "SSH:  ssh $RDP_USER@$TS_IP"
          echo "RDP:  $TS_IP:3389"
          echo "============================"

      - name: Keep Alive
        run: |
          while true; do
            echo "[$(date)] Running..."
            sleep 300
          done
