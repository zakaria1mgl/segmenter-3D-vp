name: RDP-Linux-Docker
on:
  workflow_dispatch:
jobs:
  rdp-job:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Install Desktop + XRDP
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y xfce4 xfce4-goodies xrdp firefox
          sudo systemctl enable xrdp
          sudo systemctl start xrdp
          echo xfce4-session > ~/.xsession

      - name: Create RDP User
        run: |
          PASSWORD=$(openssl rand -base64 16)
          sudo useradd -m -s /bin/bash rdpuser
          echo "rdpuser:$PASSWORD" | sudo chpasswd
          sudo usermod -aG sudo rdpuser
          echo "RDP_USER=rdpuser" >> $GITHUB_ENV
          echo "RDP_PASS=$PASSWORD" >> $GITHUB_ENV

      - name: Verify Docker
        run: |
          docker --version
          sudo docker info
          sudo docker run hello-world

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner-${{ github.run_id }}
          TS_IP=$(tailscale ip -4)
          echo "TS_IP=$TS_IP" >> $GITHUB_ENV

      - name: Show Connection Info
        run: |
          echo "============================"
          echo "✅ RDP Connected Successfully"
          echo "IP Address (Tailscale): $TS_IP"
          echo "Username: $RDP_USER"
          echo "Password: $RDP_PASS"
          echo "============================"

      - name: Keep Alive
        run: |
          while true; do
            echo "[$(date)] RDP Running..."
            sleep 300
          done
