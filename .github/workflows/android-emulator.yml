name: Android Emulator Test
on:
  workflow_dispatch:
jobs:
  run-android:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Check KVM is active
        run: |
          ls -l /dev/kvm
          egrep -c '(vmx|svm)' /proc/cpuinfo
          nproc
          free -h

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner-${{ github.run_id }}
          echo "TS_IP=$(tailscale ip -4)" >> $GITHUB_ENV

      - name: Install socat
        run: sudo apt-get update && sudo apt-get install -y socat

      - name: Run Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          profile: Nexus_5
          cores: 4
          ram-size: 8192M
          disable-animations: true
          force-avd-creation: true
          emulator-boot-timeout: 600
          # -memory and -cores passed directly to QEMU, bypassing config.ini conflicts
          # 12288M leaves ~4GB headroom for host OS + Tailscale + adb/socat out of 16GB total
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -no-audio -no-boot-anim -skin 480x800 -memory 12288 -cores 4
          script: |
            echo "Emulator is up and running."
            adb tcpip 5555
            echo "Starting ADB port forwarder ($TS_IP:5556 -> 127.0.0.1:5555)..."
            socat TCP-LISTEN:5556,bind=$TS_IP,fork,reuseaddr TCP:127.0.0.1:5555 &
            echo "============================"
            echo "Connect from your laptop:"
            echo "  adb connect $TS_IP:5556"
            echo "  scrcpy -s $TS_IP:5556 -b 1M --max-size 600 --max-fps 12"
            echo "============================"
            sleep 20700
